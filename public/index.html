<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioScan GPS v1.4.1 - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        .video-container { position: relative; width: 100%; max-width: 640px; margin: auto; }
        canvas { position: absolute; top: 0; left: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-blue-900 text-white p-4 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-blue-400">PRENSI-FACE <span class="text-white text-sm ml-1">v1.4.1</span></h1>
            <div class="space-x-2">
                <button onclick="switchTab('absensi')" class="px-4 py-2 rounded hover:bg-blue-800 transition text-sm font-semibold">Absensi</button>
                <button onclick="switchTab('pengaturan')" class="px-4 py-2 rounded hover:bg-blue-800 transition text-sm font-semibold">Pengaturan</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <div id="absensi" class="tab-content active">
            <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-lg p-6 border border-gray-200">
                <div class="flex justify-center space-x-4 mb-6">
                    <label class="flex-1 flex items-center justify-center space-x-2 cursor-pointer p-3 bg-blue-50 rounded-xl border border-blue-200 hover:bg-blue-100 transition">
                        <input type="radio" name="absensi-type" value="Masuk" checked class="w-4 h-4 text-blue-600">
                        <span class="text-sm font-black text-blue-700 uppercase">Absen Masuk</span>
                    </label>
                    <label class="flex-1 flex items-center justify-center space-x-2 cursor-pointer p-3 bg-red-50 rounded-xl border border-red-200 hover:bg-red-100 transition">
                        <input type="radio" name="absensi-type" value="Pulang" class="w-4 h-4 text-red-600">
                        <span class="text-sm font-black text-red-700 uppercase">Absen Pulang</span>
                    </label>
                </div>

                <div id="gps-status" class="mb-4 p-3 rounded-xl text-center font-bold bg-yellow-50 text-yellow-700 border border-yellow-200 text-xs tracking-widest uppercase">
                    Menunggu GPS...
                </div>

                <div class="video-container bg-black rounded-xl overflow-hidden border-4 border-gray-100 shadow-inner">
                    <video id="video" width="640" height="480" autoplay muted playsinline></video>
                </div>

                <div class="mt-6 p-4 bg-gray-900 rounded-xl">
                    <h3 class="text-blue-400 font-mono text-[10px] uppercase mb-2 tracking-widest">Log Aktivitas</h3>
                    <div id="log-content" class="text-[11px] font-mono text-gray-300 h-24 overflow-y-auto space-y-1">
                        > Sistem siap.
                    </div>
                </div>
            </div>
        </div>

        <div id="pengaturan" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4 text-blue-700 flex items-center"><span class="mr-2">⚙️</span> Konfigurasi</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Link CSV Siswa (G-Sheets)</label>
                            <div class="flex gap-2">
                                <input type="text" id="csv-url" class="flex-1 p-2 border rounded-lg mt-1 outline-none text-sm" placeholder="https://...">
                                <button onclick="fetchSiswa()" class="mt-1 bg-green-600 text-white px-4 rounded-lg text-xs font-bold hover:bg-green-700 transition">SINKRON</button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-blue-500 uppercase">URL Apps Script Backend</label>
                            <input type="text" id="endpoint-url" class="w-full p-2 border border-blue-200 rounded-lg mt-1 outline-none text-sm" placeholder="https://script.google.com/...">
                        </div>
                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase">Latitude</label>
                                <input type="number" id="target-lat" class="w-full p-2 border rounded-lg text-sm" step="any">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase">Longitude</label>
                                <input type="number" id="target-lng" class="w-full p-2 border rounded-lg text-sm" step="any">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase">Radius Jangkauan (Meter)</label>
                            <input type="number" id="target-radius" class="w-full p-2 border rounded-lg text-sm" value="50">
                        </div>
                        <button onclick="setCurrentLocation()" class="w-full bg-gray-100 text-blue-600 py-2 rounded text-[10px] font-bold hover:bg-gray-200 uppercase tracking-widest transition">Set Lokasi Sekarang</button>
                        <button onclick="saveSettings()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-black shadow-md mt-4 transition">SIMPAN PENGATURAN</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4 text-orange-600 flex items-center"><span class="mr-2">👤</span> Pendaftaran Siswa</h2>
                    <div class="space-y-4">
                        <select id="reg-kelas" onchange="updateRegNama()" class="w-full p-3 border rounded-lg outline-none text-sm bg-gray-50">
                            <option value="">-- Pilih Kelas --</option>
                        </select>
                        <select id="reg-siswa" class="w-full p-3 border rounded-lg outline-none text-sm bg-gray-50">
                            <option value="">-- Pilih Nama --</option>
                        </select>
                        <div class="bg-orange-50 border-2 border-dashed border-orange-200 p-8 text-center rounded-2xl mt-4">
                            <button onclick="registerFace()" class="bg-orange-500 text-white px-10 py-4 rounded-full font-black shadow-lg hover:bg-orange-600 transition transform active:scale-95 text-sm uppercase">
                                Daftarkan Wajah
                            </button>
                        </div>
                        <div id="reg-status" class="text-center font-bold h-6 text-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let siswaData = [];
        let settings = { csvUrl: "", endpointUrl: "", lat: 0, lng: 0, radius: 50 };
        let isLocationValid = false;
        let faceMatcher = null;
        let lastAttendance = {};

        const video = document.getElementById('video');
        const logContent = document.getElementById('log-content');
        const gpsStatus = document.getElementById('gps-status');

        window.onload = async () => {
            loadLocalSettings();
            await loadModels();
            startVideo();
            startGpsTracking();
            if (settings.endpointUrl) await syncFaceDatabase();
            initFaceDetection();
        };

        async function loadModels() {
            addLog("Mempersiapkan AI...");
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            addLog("AI siap.");
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} }).then(s => video.srcObject = s);
        }

        async function syncFaceDatabase() {
            try {
                addLog("Menghubungkan ke database wajah...");
                const res = await fetch(`${settings.endpointUrl}?action=getBiometrics`);
                const data = await res.json();
                if (data.length > 0) {
                    const labeledDescriptors = data.map(d => {
                        const desc = new Float32Array(JSON.parse(d.descriptor));
                        return new faceapi.LabeledFaceDescriptors(d.nama, [desc]);
                    });
                    faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.45);
                    addLog(`${data.length} wajah dimuat.`);
                }
            } catch (e) { addLog("Gagal sinkron data wajah."); }
        }

        async function fetchSiswa() {
            const url = document.getElementById('csv-url').value;
            if (!url) return alert("Masukkan link CSV!");
            try {
                const res = await fetch(url);
                const text = await res.text();
                const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
                
                siswaData = lines.slice(1).map(line => {
                    const cols = line.split(',').map(c => c.trim());
                    return { 
                        nis: cols,   // Kolom 1: NIS 
                        nama: cols[1],  // Kolom 2: Nama 
                        kelas: cols[2], // Kolom 3: Kelas 
                        sesi: cols[3]   // Kolom 4: Sesi 
                    };
                }).filter(s => s.nama && s.nis);

                const listKelas = [...new Set(siswaData.map(s => s.kelas))].sort();
                const selKelas = document.getElementById('reg-kelas');
                selKelas.innerHTML = '<option value="">-- Pilih Kelas --</option>';
                listKelas.forEach(k => {
                    selKelas.innerHTML += `<option value="${k}">${k}</option>`;
                });
                alert(`Data Sinkron! ${siswaData.length} entri ditemukan.`);
                saveSettings();
            } catch (e) { alert("Gagal ambil CSV!"); }
        }

        function updateRegNama() {
            const kls = document.getElementById('reg-kelas').value;
            const selNama = document.getElementById('reg-siswa');
            selNama.innerHTML = '<option value="">-- Pilih Nama --</option>';
            siswaData.filter(s => s.kelas === kls).forEach(s => {
                selNama.innerHTML += `<option value="${s.nama}">${s.nama} (${s.nis})</option>`;
            });
        }

        async function registerFace() {
            const nama = document.getElementById('reg-siswa').value;
            const infoSiswa = siswaData.find(s => s.nama === nama);
            if (!infoSiswa || !settings.endpointUrl) return alert("Data tidak lengkap!");

            const st = document.getElementById('reg-status');
            st.className = "text-center font-bold text-blue-600";
            st.innerText = "⏳ Memindai wajah...";

            const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks().withFaceDescriptor();

            if (det) {
                try {
                    await fetch(settings.endpointUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ 
                            action: 'enroll', 
                            nama: infoSiswa.nama,
                            nis: infoSiswa.nis,
                            biometric: JSON.stringify(Array.from(det.descriptor)),
                            kelas: infoSiswa.kelas,
                            timestamp: new Date().toLocaleString()
                        })
                    });
                    st.className = "text-center font-bold text-green-600";
                    st.innerText = "✅ WAJAH TERDAFTAR!";
                    await syncFaceDatabase(); // Refresh data wajah lokal
                } catch (e) { st.innerText = "❌ Gagal koneksi!"; }
            } else { st.innerText = "⚠️ Wajah tidak terdeteksi!"; }
        }

        async function recordAttendance(nama) {
            const now = Date.now();
            if (lastAttendance[nama] && (now - lastAttendance[nama] < 300000)) return; 

            const type = document.querySelector('input[name="absensi-type"]:checked').value;
            const infoSiswa = siswaData.find(s => s.nama === nama);
            lastAttendance[nama] = now;

            if (settings.endpointUrl) {
                try {
                    await fetch(settings.endpointUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ 
                            action: 'attendance', 
                            nama: nama, 
                            nis: infoSiswa ? infoSiswa.nis : "-",
                            kelas: infoSiswa ? infoSiswa.kelas : "-",
                            type: type,
                            timestamp: new Date().toLocaleString('id-ID')
                        })
                    });
                    addLog(`✅ ${type}: ${nama}`);
                } catch (e) { addLog(`❌ Gagal: ${nama}`); }
            }
        }

        function initFaceDetection() {
            video.addEventListener('play', () => {
                const canvas = faceapi.createCanvasFromMedia(video);
                document.querySelector('.video-container').append(canvas);
                const size = { width: video.width, height: video.height };
                faceapi.matchDimensions(canvas, size);

                setInterval(async () => {
                    if (!isLocationValid) { canvas.getContext('2d').clearRect(0,0,size.width,size.height); return; }
                    const dets = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                    const resized = faceapi.resizeResults(dets, size);
                    canvas.getContext('2d').clearRect(0,0,size.width,size.height);
                    
                    if (faceMatcher && resized.length > 0) {
                        resized.forEach(d => {
                            const res = faceMatcher.findBestMatch(d.descriptor);
                            new faceapi.draw.DrawBox(d.detection.box, { label: res.label }).draw(canvas);
                            if (res.label !== 'unknown' && res.distance < 0.45) recordAttendance(res.label);
                        });
                    }
                }, 600);
            });
        }

        function startGpsTracking() {
            navigator.geolocation.watchPosition(pos => {
                const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, settings.lat, settings.lng);
                isLocationValid = dist <= settings.radius;
                
                if(isLocationValid) {
                    gpsStatus.className = "mb-4 p-3 rounded-xl text-center font-bold bg-green-50 text-green-700 border border-green-200 text-xs tracking-widest uppercase";
                    gpsStatus.innerText = `READY (${Math.round(dist)}m)`;
                } else {
                    gpsStatus.className = "mb-4 p-3 rounded-xl text-center font-bold bg-red-50 text-red-700 border border-red-200 text-xs tracking-widest uppercase";
                    gpsStatus.innerText = `LOKASI DILUAR JANGKAUAN (${Math.round(dist)}m)`;
                }
            }, null, { enableHighAccuracy: true });
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function saveSettings() {
            settings = {
                csvUrl: document.getElementById('csv-url').value,
                endpointUrl: document.getElementById('endpoint-url').value,
                lat: parseFloat(document.getElementById('target-lat').value) || 0,
                lng: parseFloat(document.getElementById('target-lng').value) || 0,
                radius: parseInt(document.getElementById('target-radius').value) || 50
            };
            localStorage.setItem('presensi_v14_fixed', JSON.stringify(settings));
            alert("Pengaturan Disimpan!");
            syncFaceDatabase();
        }

        function loadLocalSettings() {
            const saved = localStorage.getItem('presensi_v14_fixed');
            if (saved) {
                settings = JSON.parse(saved);
                document.getElementById('csv-url').value = settings.csvUrl;
                document.getElementById('endpoint-url').value = settings.endpointUrl;
                document.getElementById('target-lat').value = settings.lat;
                document.getElementById('target-lng').value = settings.lng;
                document.getElementById('target-radius').value = settings.radius || 50;
            }
        }

        function setCurrentLocation() {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('target-lat').value = p.coords.latitude;
                document.getElementById('target-lng').value = p.coords.longitude;
            });
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function addLog(m) {
            const div = document.createElement('div');
            div.textContent = `> [${new Date().toLocaleTimeString()}] ${m}`;
            logContent.prepend(div);
        }
    </script>
</body>
</html>
